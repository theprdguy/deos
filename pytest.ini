[pytest]
# Restrict host-repo test collection to the host tree only.
# projects/ sub-trees are independent git repos; their server/ packages
# (e.g. projects/meation/server/) must not shadow the root server/ package.
testpaths = tests

# Belt-and-suspenders: also exclude projects/ from any recursive walk
# (handles edge cases where pytest is invoked with '.' or rootdir discovery).
norecursedirs =
    .git
    .tox
    .venv
    venv
    __pycache__
    *.egg-info
    node_modules
    projects
    apps
    packages
    bin
    docs
    devos
