version: '3.0'

# ─── OS3 Ticket Queue (example / template) ───
# CLAUDE1 (planner) writes WHAT + CONTEXT; the implementer (BUILDER or CODEX) decides HOW.
# Only `status: todo` tickets are picked up by the dispatcher. Done tickets move to ARCHIVE.yaml.
#
# Ticket schema (see devos/AI.md § Ticket Standard and docs/policy/TICKET_SCHEMA.md):
#
# - id: T-XXX
#   status: todo            # todo | doing | code_ready | needs_pm | done | blocked | parked
#   owner: BUILDER | CODEX  # BUILDER = in-session Claude sub-agent; CODEX = external subprocess
#   impl_owner: BUILDER | CODEX
#   test_owner: CODEX       # cross-test: CODEX commits failing tests first
#   tdd: required | skip | self-evident
#   mode: exploration | productization | production   # gate posture (docs/policy/MODE_GATE_MATRIX.md)
#   security_audit: false   # auto-forced true for auth/payment/permissions/external input
#   cross_model: false      # true → CODEX second-opinion (b') on the deliverable
#   goal: |                 # behavioural requirement (WHAT)
#   context: |              # why + research findings parked by CLAUDE1
#   constraints: |          # technical constraints
#   dod:                    # each item verifiable (input + expected output);
#     - 'success: <input> → <expected output>'
#     - 'error:   <bad input> → <expected error>'   # a failure-case DOD is mandatory
#   files: [<paths the ticket may modify>]
#   verify: |               # how to check completion (e.g. a test command)
#   deps: []                # prerequisite ticket ids (must be done)
#   gates: [pr-check]       # baseline gates run on completion
# ───────────────────────────────────────────────────
# See devos/AI.md "Testing Policy" for when tdd: required applies.

tickets: []
